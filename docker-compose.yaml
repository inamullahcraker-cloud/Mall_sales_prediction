version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: walmart-api

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: walmart-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped
